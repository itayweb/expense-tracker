name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel preview and get URL
        id: vercel-preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Polling Vercel for deployment of branch: $BRANCH"

          for i in $(seq 1 60); do
            DEPLOYMENT_URL=$(curl -sf "https://api.vercel.com/v6/deployments?limit=10&state=READY" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | \
              jq -r --arg branch "$BRANCH" \
              '.deployments[] | select(.meta.githubCommitRef == $branch) | .url' | head -1)

            if [ -n "$DEPLOYMENT_URL" ] && [ "$DEPLOYMENT_URL" != "null" ]; then
              echo "url=https://$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
              echo "Found preview: https://$DEPLOYMENT_URL"
              exit 0
            fi

            echo "Attempt $i/60 — not ready yet..."
            sleep 10
          done

          echo "Timed out waiting for Vercel preview deployment"
          exit 1

      - name: Run E2E tests against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel-preview.outputs.url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY_TEST }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:e2e:ci

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
